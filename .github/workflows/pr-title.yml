name: PR Title

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  pull-requests: read

jobs:
  lint-title:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Squash-merge uses the PR title as the commit message on main, which
      # release-please parses for semver bumps and the changelog.
      - name: Lint PR title against commitlint config
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: echo "$TITLE" | pnpm exec commitlint
